services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
      - redis
      - minio
      - create-bucket
    environment:
      APP_ENV: development
      APP_BASE_URL: http://localhost:8080
      LOG_LEVEL: debug
      ENCRYPTION_MASTER_KEY: 0123456789abcdef0123456789abcdef
      DATABASE_URL: postgres://imap_cache:imap_cache_password@postgres:5432/imap_cache
      REDIS_URL: redis://redis:6379
      R2_ENDPOINT: http://minio:9000
      R2_BUCKET: imap-cache
      R2_ACCESS_KEY_ID: minioadmin
      R2_SECRET_ACCESS_KEY: minioadmin
      R2_REGION: auto
      OBJECT_STORE_PATH: /var/lib/imap-cache/blob
      SEARCH_INDEX_PATH: /var/lib/imap-cache/search
      BOOTSTRAP_IMAP_USERNAME: imapped@example.com
      BOOTSTRAP_IMAP_PASSWORD: change-me-for-dev
    ports:
      - "1143:1143"
      - "8080:8080"
    volumes:
      - search_data:/var/lib/imap-cache

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: imap_cache
      POSTGRES_PASSWORD: imap_cache_password
      POSTGRES_DB: imap_cache
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/imap-cache || true
      "

  dovecot:
    image: dovecot/dovecot
    ports:
      - "10143:143"
      - "10993:993"
    profiles:
      - test

volumes:
  postgres_data:
  redis_data:
  minio_data:
  search_data:
